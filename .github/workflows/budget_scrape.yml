name: Daily Budget Data Scraper - F1 Fantasy Tools

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at midnight UTC (10:00 AM AEST / 11:00 AM AEDT)
  workflow_dispatch:        # Allows manual run from GitHub 'Actions' tab

jobs:
  scrape_job:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to commit f1_data.json back to repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run Scraper
        run: python scripts/budget_scraper.py

      - name: Push updated data
        run: |
          git config --global user.name "F1-Bot"
          git config --global user.email "bot@f1app.com"
          git add f1_data.json
          git commit -m "Auto-update budget data: $(date -u '+%Y-%m-%d %H:%M UTC')" || exit 0
          git push