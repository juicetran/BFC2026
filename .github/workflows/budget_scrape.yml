name: Budget Data Scraper - F1 Fantasy Tools

on:
  schedule:
    - cron: '0 0 * * *'    # daily at midnight UTC
  workflow_dispatch:         # allow manual trigger

jobs:
  scrape_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Scraper
        run: |
          cd scripts
          python budget_scraper.py
          mv f1_budget_data.json ../f1_budget_data.json

      - name: Push updated data
        run: |
          git config --global user.name  "F1-Bot"
          git config --global user.email "f1bot@users.noreply.github.com"
          git add f1_budget_data.json
          git diff --cached --quiet || git commit -m "chore: update f1_budget_data.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}