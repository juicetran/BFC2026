name: Budget Data Scraper - F1 Fantasy Tools

on:
  schedule:
    - cron: '0 0 * * *'    # daily at midnight UTC
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  scrape_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Scraper
        run: |
          cd scripts
          python budget_scraper.py
          echo ""
          echo "--- f1_budget_data.json preview (first 40 lines) ---"
          head -40 f1_budget_data.json || echo "File not found"
          echo ""
          echo "--- Row counts ---"
          python -c "import json; d=json.load(open('f1_budget_data.json')); print('Drivers:', len(d['drivers']), 'Constructors:', len(d['constructors'])); s=d['drivers'][0] if d['drivers'] else {}; print('Sample:', s.get('name'), 'race_pts:', s.get('race_pts'), 'req_pts:', s.get('req_pts'))" || true
          mv f1_budget_data.json ../f1_budget_data.json
          [ -f debug_dropdown.png ] && mv debug_dropdown.png ../debug_dropdown.png || true

      - name: Upload debug screenshot (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_dropdown.png
          if-no-files-found: ignore
          retention-days: 3

      - name: Push updated data
        run: |
          git config --global user.name  "F1-Bot"
          git config --global user.email "f1bot@users.noreply.github.com"
          git add f1_budget_data.json
          git status
          git diff --cached --quiet || git commit -m "chore: update f1_budget_data.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}