name: Hourly F1 Data Update

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:   # Allows manual run from GitHub 'Actions' tab

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run Scraper
        run: budget_scraper.py

      - name: Push updated data
        run: |
          git config --global user.name "F1-Bot"
          git config --global user.email "bot@f1app.com"
          git add f1_data.json
          git commit -m "Auto-update: $(date)" || exit 0
          git push